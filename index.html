<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#162d5a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Veyra" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pokémon Veyra</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="titleScreen" class="screen title-screen is-active">
      <div class="title-card">
        <p class="eyebrow">Luiz Matheus apresenta</p>
        <h1><span>Pokémon</span> Veyra</h1>
        <p class="subtitle">Um RPG textual/top-down retrô feito para portfólio.</p>
        <div class="fake-cartridge">
          <div class="cart-line"></div><div class="cart-screen">VY</div><div class="cart-pins"></div>
        </div>
        <div id="titleActions" class="title-actions"></div>
        <small class="legal-mini">Projeto fã não comercial. Pokémon pertence à Nintendo, The Pokémon Company, Creatures Inc. e GAME FREAK.</small>
      </div>
    </section>

    <section id="cinematicScreen" class="screen cinematic-screen">
      <div class="cinematic-noise"></div>
      <div id="cinematicBox" class="cinematic-box"></div>
    </section>

    <section id="gameScreen" class="screen game-screen">
      <div class="phone-safe">
        <header class="game-topbar">
          <div><b id="locName">Cove</b><span id="questText">...</span></div>
          <div class="hud-right"><span id="moneyText">₽ 0</span><div id="partyHud" class="party-hud"></div></div>
        </header>
        <div id="routeProgressWrap" class="route-progress" hidden><i id="routeProgress"></i></div>
        <section class="gb-frame">
          <canvas id="mapCanvas" aria-label="Mapa top-down do jogo" width="240" height="160"></canvas>
          <div id="transition" class="transition"></div>
        </section>
        <div id="dialogue" class="dialogue"><p>Use o direcional. A: interagir. B: menu.</p></div>
        <div class="quick-row">
          <button id="quickParty"><span>●</span> Equipe</button>
          <button id="quickBag"><span>▣</span> Bolsa</button>
          <button id="quickDex"><span>◇</span> Dex</button>
          <button id="menuBtn"><span>☰</span> Menu</button>
        </div>
        <section class="controls" aria-label="Controles de jogo">
          <div class="dpad">
            <button data-dir="up">▲</button>
            <button data-dir="left">◀</button>
            <button data-dir="right">▶</button>
            <button data-dir="down">▼</button>
          </div>
          <div class="ab-buttons">
            <button id="aBtn">A</button>
            <button id="bBtn">B</button>
          </div>
        </section>
      </div>
    </section>

    <section id="battleScreen" class="screen battle-screen"></section>
  </main>

  <div id="menu" class="menu-layer"></div>
  <div id="modal" class="modal-layer"></div>
  <div id="toast" class="toast"></div>

  <script src="src/data.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
